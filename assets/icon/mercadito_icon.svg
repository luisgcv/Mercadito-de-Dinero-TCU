<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C0F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005DA4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" />
  
  <!-- Carrito de compras -->
  <g transform="translate(100, 100)">
    <!-- Asa del carrito -->
    <path d="M -25 -20 Q -35 -35 -20 -45" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Cuerpo del carrito -->
    <path d="M -30 -15 L -28 10 Q -28 18 -20 18 L 25 18 Q 33 18 33 10 L 35 -15 Z" fill="white" stroke="white" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Líneas internas del carrito -->
    <line x1="-15" y1="-15" x2="-10" y2="18" stroke="#005DA4" stroke-width="2"/>
    <line x1="5" y1="-15" x2="10" y2="18" stroke="#005DA4" stroke-width="2"/>
    
    <!-- Ruedas -->
    <circle cx="-15" cy="26" r="5" fill="#005DA4"/>
    <circle cx="18" cy="26" r="5" fill="#005DA4"/>
  </g>
  
  <!-- Moneda decorativa (esquina inferior derecha) -->
  <circle cx="150" cy="150" r="20" fill="#F99D1C" stroke="#F37021" stroke-width="2"/>
  <text x="150" y="157" text-anchor="middle" font-size="20" font-weight="bold" fill="white">C</text>
</svg>
